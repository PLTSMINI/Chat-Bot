<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #00e5ff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --user-bubble: #1e1a2e;
    --ai-bubble: #131320;
    --success: #00e5aa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: #fff;
    box-shadow: 0 0 16px rgba(124,92,252,0.4);
    flex-shrink: 0;
  }
  .header-info h1 {
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-info p { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .status-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .model-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    outline: none;
    max-width: 220px;
  }
  .model-select option { background: var(--surface); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; max-width: 100%; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    font-family: 'Space Mono', monospace;
  }
  .avatar.ai { background: linear-gradient(135deg,#1e1a3a,#2a1a4a); border: 1px solid var(--accent); color: var(--accent); }
  .avatar.user { background: linear-gradient(135deg,#1a2e1a,#1a3020); border: 1px solid var(--accent2); color: var(--accent2); }

  .bubble {
    max-width: calc(100% - 80px);
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,92,252,0.3);
    border-top-right-radius: 4px;
  }
  .bubble pre {
    background: #0d0d16;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .bubble code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(0,229,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .bubble pre code { background: none; padding: 0; color: #a0e0ff; }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .welcome .big { font-size: 40px; margin-bottom: 8px; }
  .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .welcome p { font-size: 13px; font-family: 'Space Mono', monospace; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,92,252,0.12); }
  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    min-height: 22px;
  }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #5a3fd4);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(124,92,252,0.35);
  }
  .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 18px rgba(124,92,252,0.5); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width:16px; height:16px; fill:#fff; }
  .input-footer {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; margin-top: 6px;
  }
  .input-hint { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .clear-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: #ff6b6b; }
  .error-bar {
    color: #ff6b6b;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    padding: 6px 10px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 8px;
    margin-top: 6px;
    display: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">RF</div>
  <div class="header-info">
    <h1>RF AI Chat</h1>
    <p id="modelLabel">openrouter</p>
  </div>
  <div class="status-dot"></div>
  <div class="header-right">
    <select class="model-select" id="modelSelect" onchange="updateModel()">
      <optgroup label="🆓 Free Models">
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
        <option value="deepseek/deepseek-r1-0528:free">DeepSeek R1 0528 (Free)</option>
        <option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek V3 (Free)</option>
        <option value="nvidia/llama-3.3-nemotron-super-49b-v1:free">Nemotron 3 Super 120B (Free)</option>
        <option value="mistralai/devstral-2505:free">Devstral 2 Coding (Free)</option>
        <option value="qwen/qwen3-coder:free">Qwen3 Coder 480B (Free)</option>
        <option value="openai/gpt-4o-mini-search-preview:free">GPT-OSS 120B (Free)</option>
        <option value="google/gemma-3-27b-it:free">Gemma 3 27B (Free)</option>
        <option value="google/gemma-3-12b-it:free">Gemma 3 12B (Free)</option>
        <option value="mistralai/mistral-small-3.1-24b-instruct:free">Mistral Small 3.1 (Free)</option>
        <option value="qwen/qwen3-30b-a3b:free">Qwen3 30B (Free)</option>
        <option value="microsoft/phi-4-reasoning-plus:free">Phi-4 Reasoning (Free)</option>
        <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B Fast (Free)</option>
      </optgroup>
      <optgroup label="💎 Paid Models">
        <option value="anthropic/claude-3.5-haiku">Claude 3.5 Haiku</option>
        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
        <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
        <option value="google/gemini-flash-1.5">Gemini 1.5 Flash</option>
        <option value="deepseek/deepseek-chat">DeepSeek V3 (Paid)</option>
        <option value="deepseek/deepseek-r1">DeepSeek R1 (Paid)</option>
        <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B (Paid)</option>
        <option value="mistralai/mistral-large">Mistral Large</option>
        <option value="x-ai/grok-3-mini-beta">Grok 3 Mini</option>
      </optgroup>
    </select>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome">
    <div class="big">🤖</div>
    <h2>Selamat datang di RF AI Chat</h2>
    <p>Powered by OpenRouter · Pilih model & mulai chat</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Ketik pesan..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Kirim">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-footer">
    <span class="input-hint">Enter kirim · Shift+Enter baris baru</span>
    <button class="clear-btn" onclick="clearChat()">× Hapus chat</button>
  </div>
  <div class="error-bar" id="errorBar"></div>
</div>

<script>
const API_KEY = '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';
const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

let model = 'meta-llama/llama-3.3-70b-instruct:free';
let history = [];
let isLoading = false;

function updateModel() {
  model = document.getElementById('modelSelect').value;
  const label = document.getElementById('modelSelect').options[document.getElementById('modelSelect').selectedIndex].text;
  document.getElementById('modelLabel').textContent = label;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function scrollBottom() {
  const m = document.getElementById('messages');
  requestAnimationFrame(() => m.scrollTop = m.scrollHeight);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`\n]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  bar.textContent = '⚠ ' + msg;
  bar.style.display = 'block';
  setTimeout(() => bar.style.display = 'none', 6000);
}

function addMessage(role, content) {
  const msgs = document.getElementById('messages');
  const welcome = msgs.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar ${role}">${role === 'ai' ? 'AI' : 'U'}</div>
    <div class="bubble">
      ${role === 'ai'
        ? '<div class="typing"><span></span><span></span><span></span></div>'
        : renderMd(content)}
    </div>`;
  msgs.appendChild(div);
  scrollBottom();
  return div.querySelector('.bubble');
}

function clearChat() {
  history = [];
  document.getElementById('messages').innerHTML = `
    <div class="welcome">
      <div class="big">🤖</div>
      <h2>Selamat datang di RF AI Chat</h2>
      <p>Powered by OpenRouter · Pilih model & mulai chat</p>
    </div>`;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isLoading = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  const aiBubble = addMessage('ai', '');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': 'https://rf-ai.local',
        'X-Title': 'RF AI Chat'
      },
      body: JSON.stringify({
        model,
        messages: history,
        stream: true,
        max_tokens: 2048
      })
    });

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try {
        const errJson = await res.json();
        errMsg = errJson?.error?.message || errMsg;
      } catch {}
      throw new Error(errMsg);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          if (delta) {
            full += delta;
            aiBubble.innerHTML = renderMd(full);
            scrollBottom();
          }
        } catch {}
      }
    }

    if (!full) full = '_(Model tidak memberikan respons)_';
    aiBubble.innerHTML = renderMd(full);
    history.push({ role: 'assistant', content: full });

  } catch (err) {
    aiBubble.innerHTML = `<span style="color:#ff6b6b">❌ Error: ${escHtml(err.message)}</span>`;
    showError(err.message);
    history.pop(); // rollback user message from history
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
  scrollBottom();
}

// Init label
updateModel();
document.getElementById('input').focus();
</script>
</body>
</html>
